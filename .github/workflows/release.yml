name: release-desktop

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.platform }} · ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            os: macos
          - platform: macos-latest
            target: x86_64-apple-darwin
            os: macos
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            os: windows
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            os: linux

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf

      - name: Regenerate Phoenix icons from setup_icons.py
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow
          python backend/setup_icons.py

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: yarn install --frozen-lockfile

      - name: Build frontend bundle
        working-directory: ./frontend
        env:
          REACT_APP_BACKEND_URL: ${{ secrets.REACT_APP_BACKEND_URL }}
          CI: 'false'
        run: yarn build

      - name: Tauri build (${{ matrix.target }})
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./src-tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'RIBA ${{ github.ref_name }}'
          releaseBody: |
            ## RIBA Desktop · Bantu Digital Audio Workstation

            **Native installer** for ${{ matrix.os }} (${{ matrix.target }}).

            - 🔥 Phoenix branding
            - 🌐 5 langues : Français · English · Español · Português · Kiswahili
            - 🎛 Bantu Oral Grid + Bantu Swing Live
            - 📖 Bantu Storytelling (Mvett) with real audio impact
            - 🌐 Studio Live Session (collaborative WebRTC + Y.js)

            ⚠ Build non code-signed yet. macOS: right-click → Open to bypass Gatekeeper.
            Windows SmartScreen may flag the installer.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

  publish:
    name: Finalize release notes
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Mark release as ready
        run: |
          echo "All platform binaries built — open the draft release on GitHub,"
          echo "review the assets, and click 'Publish release' to ship."
