# RIBA · Multi-platform desktop release pipeline
#
# Triggered on any pushed tag matching `v*.*.*` (e.g. `git tag v3.4.0 && git push --tags`).
# Builds signed-ready installers on the three native runners and publishes
# a draft GitHub Release with the artifacts attached.
#
# Outputs :
#   • Windows  → RIBA_<version>_x64-setup.exe (NSIS) + RIBA_<version>_x64_en-US.msi
#   • macOS    → RIBA_<version>_aarch64.dmg + RIBA_<version>_x64.dmg
#   • Linux    → RIBA_<version>_amd64.deb + RIBA_<version>_amd64.AppImage
#
# Code signing (post-MVP) :
#   • Windows : add a CSC_LINK + CSC_KEY_PASSWORD secret (EV cert .pfx)
#   • macOS   : add APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD /
#                       APPLE_SIGNING_IDENTITY / APPLE_ID / APPLE_PASSWORD /
#                       APPLE_TEAM_ID  (and uncomment the env block below)
name: release-desktop

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.platform }} · ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Universal (Apple Silicon)
          - platform: macos-latest
            target: aarch64-apple-darwin
            os: macos
          # macOS Intel
          - platform: macos-latest
            target: x86_64-apple-darwin
            os: macos
          # Windows x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            os: windows
          # Linux x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            os: linux

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf

      - name: Regenerate Phoenix icons from setup_icons.py
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow
          python backend/setup_icons.py

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: yarn install --frozen-lockfile

      - name: Build frontend bundle
        working-directory: ./frontend
        env:
          # Production deployments embed REACT_APP_BACKEND_URL at build time.
          # Set this via the Github repo secret `REACT_APP_BACKEND_URL`.
          REACT_APP_BACKEND_URL: ${{ secrets.REACT_APP_BACKEND_URL }}
          CI: 'false'
        run: yarn build

      - name: Tauri build (${{ matrix.target }})
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional code-signing secrets (see header)
          # APPLE_CERTIFICATE:           ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD:  ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY:      ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID:                    ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD:              ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID:               ${{ secrets.APPLE_TEAM_ID }}
          # TAURI_SIGNING_PRIVATE_KEY:   ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: ./src-tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'RIBA ${{ github.ref_name }}'
          releaseBody: |
            ## RIBA Desktop · Bantu Digital Audio Workstation

            **Native installer** for ${{ matrix.os }} (${{ matrix.target }}).

            - 🔥 Phoenix branding
            - 🌐 5 langues : Français · English · Español · Português · Kiswahili
            - 🎛 Bantu Oral Grid + Bantu Swing Live
            - 📖 Bantu Storytelling (Mvett) with real audio impact
            - 🌐 Studio Live Session (collaborative WebRTC + Y.js)

            ⚠ This build is **not** code-signed yet. macOS will warn on first
            launch — right-click → Open to bypass Gatekeeper. Windows SmartScreen
            may flag the installer until we add an EV cert.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

  publish:
    name: Finalize release notes
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Mark release as ready
        run: |
          echo "All platform binaries built — open the draft release on GitHub,"
          echo "review the assets, and click 'Publish release' to ship."
